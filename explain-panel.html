<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PK-LLM тАФ Explanation Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b6b;
    --accent3: #6b8bff;
    --accent4: #ffd700;
    --text: #e0e0f0;
    --muted: #555570;
    --dim: #1a1a28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  h1, h2, h3, .mono { font-family: 'Space Mono', monospace; }

  #panel-explain {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
    background: var(--panel);
    min-height: 100vh;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .explain-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--dim);
    flex-shrink: 0;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 9px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent3); color: var(--accent3); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .nav-center {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    flex: 1;
    padding: 0 8px;
  }
  .nav-step-name {
    display: block;
    color: var(--accent4);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .explain-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
    padding: 8px 14px 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .e-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .e-dot:hover   { background: var(--muted); }
  .e-dot.reached { background: #00ff8840; border-color: var(--accent); }
  .e-dot.current { background: var(--accent4); border-color: var(--accent4); transform: scale(1.35); }

  .explain-body { flex: 1; overflow-y: auto; }

  .explain-hero {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .explain-emoji-wrap { font-size: 2.0rem; margin-bottom: 7px; display: block; }
  .explain-step-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--accent4);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .explain-tagline { font-size: 1.1rem; font-weight: 600; color: var(--text); line-height: 1.3; }

  .explain-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .explain-section-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .explain-plain { font-size: 0.92rem; color: #b0b0d0; line-height: 1.75; }
  .explain-plain strong { color: var(--text); }
  .explain-plain em     { color: var(--accent3); font-style: normal; }

  .explain-tech-box {
    background: #07070d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 11px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.75;
  }
  .explain-tech-box .hl  { color: var(--accent4); }
  .explain-tech-box .hl2 { color: var(--accent); }
  .explain-tech-box .hl3 { color: var(--accent2); }
  .explain-tech-box .hl4 { color: var(--accent3); }

  .explain-footer {
    padding: 10px 14px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--dim);
    display: flex;
    gap: 6px;
  }
  .explain-footer .nav-btn { flex: 1; padding: 7px; font-size: 0.76rem; }
  .explain-footer .nav-btn.primary { border-color: var(--accent3); color: var(--accent3); }
  .explain-footer .nav-btn.primary:hover:not(:disabled) { background: #6b8bff20; }
</style>
</head>
<body>

<div id="panel-explain">

  <div class="explain-nav">
    <button class="nav-btn" id="ep-prev-t" onclick="explainNav(-1)" disabled>тЖР PREV</button>
    <div class="nav-center">
      <span class="nav-step-name" id="nav-step-name">WELCOME</span>
      <span id="nav-counter">1 / 1</span>
    </div>
    <button class="nav-btn" id="ep-next-t" onclick="explainNav(1)" disabled>NEXT тЖТ</button>
  </div>

  <div class="explain-dots" id="explain-dots"></div>

  <div class="explain-body" id="explain-body">
    <!-- injected by JS -->
  </div>

  <div class="explain-footer">
    <button class="nav-btn" id="ep-prev-b" onclick="explainNav(-1)" disabled>тЖР PREV</button>
    <button class="nav-btn primary" id="ep-next-b" onclick="explainNav(1)" disabled>NEXT тЖТ</button>
  </div>

</div>

<script>
// Model constants (needed by explanation template literals)
const VOCAB_SIZE=26, D_MODEL=8, D_K=6, SEQ_LEN=3, LR=0.03;

// тФАтФА Explanation Panel тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const EXPLAIN_ORDER=['welcome','embed','qkv','scores','softmax','output','logits','loss','backprop','infer_start','infer_step'];
let EC=0;

const EXPL={
  welcome:{
    emoji:'ЁЯза', label:'WELCOME',
    tagline:'A real language model, running in your browser',
    plain:`This visualiser runs a genuine (tiny) transformer neural network тАФ the same fundamental architecture behind ChatGPT, Claude, and every other large language model.

It's been scaled to toy size so every individual number is visible, but the mathematics is identical to production models.

<strong>How to use it:</strong> press <strong>STEP</strong> in the left panel to run one training example through the model. Each press fires all eight stages of the forward and backward pass. Each stage is queued here as a card тАФ use <strong>тЖР PREV</strong> and <strong>NEXT тЖТ</strong> to read through them at your own pace, completely independent of training speed.

You can also click any stage pill at the top of the centre panel to jump directly to the most recent explanation of that stage.

After training for a few epochs (use <strong>TRAIN EPOCH</strong> or <strong>AUTO-TRAIN</strong>), press <strong>START INFERENCE</strong> to watch the trained model generate tokens on its own.`,
    tech:null
  },
  embed:{
    emoji:'ЁЯФд', label:'STEP 1 тАФ EMBED',
    tagline:'Turning letters into lists of numbers',
    plain:`The model can only work with numbers, not letters. So the first thing it does is look up each input token in a large table called the <strong>embedding matrix</strong>.

Think of it as a dictionary where every word has been assigned a unique "address" in a high-dimensional mathematical space. Each token becomes a short list of numbers тАФ a <em>vector</em>. Crucially, tokens with similar meanings end up near each other in this space, which is part of what makes language models work.

We also add <strong>positional encodings</strong> тАФ a second set of numbers that tell the model whether a token appeared first, second, or third in the sequence. Without this, the model would treat "A B C" identically to "C A B," losing all word-order information.

The colour-coded grid in the centre panel shows the resulting embedding matrix тАФ each row is one token's vector representation.`,
    tech:`Tokens looked up in embedding table E (${VOCAB_SIZE}├Ч${D_MODEL} learnable parameters).\nPositional encoding PE[pos] added element-wise.\n\nResult: ${SEQ_LEN}├Ч${D_MODEL} matrix shown in centre panel.\nEach row = one token's combined semantic + positional vector.`
  },
  qkv:{
    emoji:'ЁЯФН', label:'STEP 2 тАФ QUERY ┬╖ KEY ┬╖ VALUE',
    tagline:'Every token asks a question, broadcasts an identity, and holds information',
    plain:`This is the central idea of the attention mechanism. For each token, the model creates three separate representations by multiplying its embedding through three learned weight matrices:

<strong>Query (Q)</strong> тАФ "What am I looking for?" The question a token is asking of the rest of the sequence.

<strong>Key (K)</strong> тАФ "What do I represent?" Each token's self-description тАФ what it's advertising to other tokens that might want to attend to it.

<strong>Value (V)</strong> тАФ "What do I actually carry?" The content a token will contribute if another token decides to attend to it.

A useful analogy: imagine a library search system. Your search query is Q, the book catalogue labels are K, and the actual book contents are V. The model learns тАФ through training тАФ which kinds of queries match which kinds of keys.`,
    tech:`Q = embeds ┬╖ <span class="hl">Wq</span>  (${SEQ_LEN}├Ч${D_MODEL} ┬╖ ${D_MODEL}├Ч${D_K} = ${SEQ_LEN}├Ч${D_K})\nK = embeds ┬╖ <span class="hl">Wk</span>  same shape\nV = embeds ┬╖ <span class="hl">Wv</span>  same shape\n\nd_k = ${D_K}, d_model = ${D_MODEL}\nThe three matrices Wq, Wk, Wv are what\nget learned during backpropagation.`
  },
  scores:{
    emoji:'ЁЯУК', label:'STEP 3 тАФ ATTENTION SCORES',
    tagline:'How relevant is each token to every other token?',
    plain:`Now the model compares each token's <em>question</em> (Query) against every other token's <em>description</em> (Key) using a dot product тАФ a mathematical operation that gives a high score when two vectors point in similar directions, and a low score otherwise.

We divide by a <strong>scaling factor</strong> (тИЪdтВЦ). Without this, in larger models the dot products grow very large, which causes problems in the next step. This "scaling" is where the technique gets its formal name: scaled dot-product attention.

We also apply a <strong>causal mask</strong>: position i cannot attend to positions after it. This is what makes the model autoregressive тАФ at generation time, you don't know future tokens, so we enforce that during training too.`,
    tech:`scores = Q ┬╖ Kс╡А / тИЪ${D_K}\n       = Q ┬╖ Kс╡А / <span class="hl">${Math.sqrt(D_K).toFixed(3)}</span>\n\nResult shape: ${SEQ_LEN}├Ч${SEQ_LEN}\n(one score per queryтАУkey pair)\n\nCausal mask: upper triangle set to тИТтИЮ\nso softmax maps them to тЙИ 0.`
  },
  softmax:{
    emoji:'ЁЯМбя╕П', label:'STEP 4 тАФ SOFTMAX',
    tagline:'Converting raw scores into a probability distribution',
    plain:`The raw attention scores are arbitrary numbers. Softmax squashes them into values between 0 and 1 that <strong>all add up to exactly 1</strong> тАФ turning them into proper attention weights.

A weight of 0.9 means "this token is devoting nearly all its attention to that one other token." Equal weights mean "drawing a little from everyone."

The coloured grid in the centre panel is this attention matrix. <strong>Brighter/greener cells mean stronger attention</strong>. You can literally see what the model is "looking at" as it reads each position.

Watch how this pattern changes as training progresses тАФ early on, the weights are nearly uniform (the model doesn't know what to focus on yet). Later, clearer patterns emerge.`,
    tech:`softmax(xс╡в) = exp(xс╡в) / ╬гт▒╝ exp(xт▒╝)\nApplied row-wise: each row sums to 1.\n\nCell (i, j) = how much token i\n              attends to token j.\n\nUpper triangle тЙИ 0 (causal mask).\nDiagonal is often largest тАФ tokens\nfrequently attend to themselves.`
  },
  output:{
    emoji:'ЁЯзо', label:'STEP 5 тАФ OUTPUT',
    tagline:'Blending information from across the sequence',
    plain:`Now we use the attention weights to actually <strong>mix information together</strong>. Each token's output is a weighted blend of all the Value vectors, where the weights come from the attention scores.

If token 3 paid heavy attention to token 1, its output will be heavily influenced by token 1's Values. This is how <em>context flows</em> through the model тАФ a token can "reach back" and absorb meaning from earlier positions.

The result is projected through one more matrix (<strong>Wo</strong>) to restore the original dimension, then <strong>added back to the original input</strong>. This addition is called a residual connection or skip connection тАФ a crucial engineering trick that gives gradients a direct path backwards and helps the network learn much more reliably.`,
    tech:`attn_out = attnWeights ┬╖ V  (${SEQ_LEN}├Ч${D_K})\nprojected = attn_out ┬╖ Wo\n          (${D_K}├Ч${D_MODEL} тЖТ ${SEQ_LEN}├Ч${D_MODEL})\n\nresidual = embeds + projected\n         тЖР skip / residual connection\n\nThe output grid in the centre panel\nshows attn_out before projection.`
  },
  logits:{
    emoji:'ЁЯО▓', label:'STEP 6 тАФ LOGITS',
    tagline:"Translating the model's understanding into a prediction",
    plain:`We take the last token's representation тАФ the most "informed" position, since it can attend to everything before it тАФ and ask: <em>given everything the model has processed, what token should come next?</em>

This is done via a final weight matrix (<strong>Wout</strong>) that maps the model's internal representation to one score per vocabulary token. These raw scores are called <strong>logits</strong>.

Another softmax converts them into a proper probability distribution. The model is essentially saying: "I think there's a 60% chance the next token is D, a 25% chance it's E..." and so on.

The probability bars shown during inference come directly from this step.`,
    tech:`lastHidden = residual[${SEQ_LEN-1}]  (shape: ${D_MODEL})\nlogits = lastHidden ┬╖ Wout + b  (shape: ${VOCAB_SIZE})\nprobs = softmax(logits)\n\nThe highest-probability token becomes\nthe model's prediction for the next token.`
  },
  loss:{
    emoji:'ЁЯУЙ', label:'STEP 7 тАФ LOSS',
    tagline:'Measuring how wrong the model was',
    plain:`The model has made a prediction. Now we compare it to the <strong>correct answer</strong> and score how wrong it was.

We use <strong>cross-entropy loss</strong>, which measures how <em>surprised</em> the model was by the right answer. If the model said "90% chance D" and D was correct, it barely gets penalised. If it said "2% chance D" and D was still correct, the loss is high.

Mathematically: loss = тИТlog(probability assigned to correct token).

Watch the loss graph in the left panel тАФ it should trend <strong>downward</strong> as training progresses. Each epoch should average lower than the last. When the model starts confidently predicting correctly, the loss approaches zero.`,
    tech:`CE loss = тИТlog P(target)\n\nThe lower the probability assigned to the\ncorrect token, the higher the loss.\n\nRandom baseline: ${Math.log(VOCAB_SIZE).toFixed(3)}\n(loss of a model that guesses uniformly)\n\nWatch the loss graph on the left тАФ it\nshould trend downward as training runs.`
  },
  backprop:{
    emoji:'ЁЯФД', label:'STEP 8 тАФ BACKPROP',
    tagline:'Learning from mistakes by adjusting every single weight',
    plain:`This is where learning actually happens. We work <strong>backwards</strong> through every calculation, using the chain rule of calculus to answer: "if this weight had been slightly different, would the loss have gone up or down?"

The answer for each weight is its <strong>gradient</strong> тАФ an arrow pointing in the direction that would increase the loss. We then take a small step in the <em>opposite</em> direction. This is gradient descent.

Every number in every weight matrix тАФ Wq, Wk, Wv, Wo, and Wout тАФ gets nudged slightly towards making the prediction more correct. After thousands of examples, these tiny nudges accumulate into genuine learned patterns.

Watch the weight matrices in the third panel тАФ their colours shift subtly after every backprop step as the values change.`,
    tech:`Chain rule traversal (reverse of forward pass):\nтИВL/тИВWout тЖТ тИВL/тИВlastH тЖТ тИВL/тИВWo\nтЖТ тИВL/тИВattnWeights тЖТ тИВL/тИВV, тИВL/тИВK, тИВL/тИВQ\nтЖТ тИВL/тИВWv, тИВL/тИВWk, тИВL/тИВWq\n\nSGD update: <span class="hl">W тЖР W тИТ ${LR} ├Ч тИЗW</span>\nGradients clipped to ┬▒2 (prevents explosion)\nUpdated: <span class="hl2">Wq, Wk, Wv, Wo, Wout, b_out</span>`
  },
  infer_start:{
    emoji:'ЁЯЪА', label:'INFERENCE START',
    tagline:'The model puts its training to work',
    plain:`Training is paused. The model now runs in <strong>inference mode</strong> тАФ no more learning, just predicting.

We've given it a starting sequence (shown in blue). It will predict what comes next, one token at a time.

The forward pass is identical to training, but we skip the loss and backpropagation steps entirely. We just read off the probability distribution and pick the most likely next token.

The chosen token is then added to the context, and the model predicts again from the updated context. This is called <strong>autoregressive generation</strong> тАФ each token feeds into the next, extending the sequence step by step.`,
    tech:null
  },
  infer_step:{
    emoji:'тК│', label:'INFERENCE STEP',
    tagline:'One more token generated',
    plain:`The model ran a full forward pass on the current context and produced a probability distribution over all 26 possible next tokens.

The bar chart shows these probabilities. The <strong>green bar</strong> is the model's top choice тАФ the token it is most confident about.

After enough training, you should see the model confidently picking the correct continuation of the pattern. If all bars are roughly equal, the model hasn't yet learned this pattern тАФ try training for more steps.

The attention heatmap in the centre panel also updates to show which tokens in the context the model was attending to when making this prediction.`,
    tech:null
  }
};

// тФАтФА Explanation UI тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function buildDots(){
  const c=document.getElementById('explain-dots');
  c.innerHTML='';
  EXPLAIN_ORDER.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='e-dot';
    d.title=EXPLAIN_ORDER[i];
    d.onclick=()=>showExplain(i);
    c.appendChild(d);
  });
  updateDots();
}
function updateDots(){
  document.querySelectorAll('.e-dot').forEach((d,i)=>{
    d.className='e-dot'+(i===EC?' current':' reached');
  });
}
function updateNavBtns(){
  const atS=EC<=0, atE=EC>=EXPLAIN_ORDER.length-1;
  ['ep-prev-t','ep-prev-b'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=atS;});
  ['ep-next-t','ep-next-b'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=atE;});
}
function showExplain(idx){
  if(idx<0||idx>=EXPLAIN_ORDER.length)return;
  EC=idx;
  const key=EXPLAIN_ORDER[idx];
  const e=EXPL[key];
  if(!e)return;
  const tech=e.tech||null;
  document.getElementById('explain-body').innerHTML=`
    <div class="explain-hero">
      <span class="explain-emoji-wrap">${e.emoji}</span>
      <div class="explain-step-label">${e.label}</div>
      <div class="explain-tagline">${e.tagline}</div>
    </div>
    <div class="explain-section">
      <div class="explain-section-title">Plain English</div>
      <div class="explain-plain">${e.plain.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>').replace(/<p><\/p>/g,'')}</div>
    </div>
    ${tech?`<div class="explain-section">
      <div class="explain-section-title">Technical Detail</div>
      <div class="explain-tech-box">${tech}</div>
    </div>`:''}
  `;
  document.getElementById('nav-step-name').textContent=e.label;
  document.getElementById('nav-counter').textContent=`${idx+1} / ${EXPLAIN_ORDER.length}`;
  updateDots(); updateNavBtns();
  document.getElementById('explain-body').scrollTop=0;
}
function explainNav(dir){
  const n=EC+dir;
  if(n>=0&&n<EXPLAIN_ORDER.length)showExplain(n);
}

// Keyboard navigation
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')explainNav(-1);
  if(e.key==='ArrowRight')explainNav(1);
});

// Init
buildDots();
showExplain(0);
</script>
</body>
</html>
